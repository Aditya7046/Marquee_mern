<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile card</title>
    <style>
        .mainbox{
            border: 3px solid ;
            background-color: blue;
            width: 50%;
            margin: 130px;
            height: 550px;
            border-radius: 8%;
            background: linear-gradient(0deg, #edeae9 65%, rgb(51, 113, 255) 0%);

        }
        .img{
            height: 160px;
            border-radius: 80px;
            position: absolute;
            border: 3px solid rgb(51, 113, 255);
            margin: 70px;

        }
        .cl{
           margin: 80px; 
           position: relative;
           top: 30%;
font-weight: 20000;
           font-size: 30px;
          
        }
        .yb{
            margin: 50px;
            position:relative;
            top: 100px;
            font-size: 25px;
            
        }
        .sm{
            position: relative;
             top: 60px;
             margin: -10px;

        }
          .sb{
            
            border: 2px solid black;
            border-radius: 50%;
            position: relative;
            text-align: center;
            width: 120px;
            height: 30px;
            top: 60px;
            margin: 30px;
            size: 100%;
            background-color: rgb(37, 129, 220);
            
            
          }
          .mes{
             border: 2px solid black;
            border-radius: 50%;
            position: relative;
            text-align: center;
            width: 120px;
            height: 30px;
            top: -142px;
            margin: 170px;
            size: 100%;
            background-color: rgb(37, 129, 220);

          }
            
        
    </style>
</head>
<body>
    <div class="mainbox">
        <img src="/pf pic.jpeg" alt="" class="img">
     <h2 class="cl">Coding lab</h2>
          <p class="yb">youtuber & Blogger</p>
          <img src="/socialm.png" alt="" class="sm">
        <p class="sb"> <b>subscribe</b></p>
        <p class="mes"> <b>message</b></p>
    </div>
</body>
</html>
